<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Animais Disponíveis</h1>

  <div class="grid grid-cols-3 gap-4">

    <div *ngFor="let animal of animals" class="bg-white p-4 rounded shadow">

      <h2 class="font-bold text-lg">{{ animal.name }}</h2>
      <p>{{ animal.species }} - {{ animal.breed }}</p>
      <p>Idade: {{ animal.age }}</p>
      <p>Tamanho: {{ animal.size }}</p>

      <button 
        [routerLink]="['/animal', animal.id]"
        class="mt-2 bg-blue-500 text-white px-3 py-1 rounded">
        Ver detalhes
      </button>

    </div>

  </div>
</div>
