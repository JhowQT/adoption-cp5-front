<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Animais Disponíveis</h1>

  <p>Total de animais: {{ animals.length }}</p>

  <div *ngIf="animals.length === 0">
    <p>Nenhum animal encontrado.</p>
  </div>

  <div *ngFor="let animal of animals" class="bg-white p-4 mb-3 rounded shadow">

    <h2 class="font-bold text-lg">{{ animal.name }}</h2>

    <p><strong>Espécie:</strong> {{ animal.species }}</p>
    <p><strong>Raça:</strong> {{ animal.breed }}</p>
    <p><strong>Idade:</strong> {{ animal.age }}</p>

    <button
      [routerLink]="['/animal', animal.id]"
      class="mt-2 bg-blue-500 text-white px-3 py-1 rounded">
      Ver detalhes
    </button>

  </div>

</div>
