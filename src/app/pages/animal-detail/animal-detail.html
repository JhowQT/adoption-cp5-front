<div class="p-6" *ngIf="animal">

  <h1 class="text-2xl font-bold">{{ animal.name }}</h1>

  <p>{{ animal.species }} - {{ animal.breed }}</p>
  <p>Idade: {{ animal.age }}</p>
  <p>Tamanho: {{ animal.size }}</p>
  <p>{{ animal.description }}</p>

  <button 
    (click)="adopt()"
    class="mt-4 bg-green-500 text-white px-4 py-2 rounded">
    Adotar
  </button>

</div>
